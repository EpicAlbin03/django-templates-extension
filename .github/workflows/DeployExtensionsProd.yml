name: Tagged Production Deploys for VS Code

on:
  push:
    tags:
      - "django-vscode-*"

permissions: {}

jobs:
  deploy:
    # prevents this action from running on forks
    if: github.repository == 'EpicAlbin03/django-templates-extension'
    # The environment name is part of the Entra federated credential subject.
    environment: vscode-marketplace
    permissions:
      contents: read # to fetch code for packaging
      id-token: write # to exchange GitHub's OIDC token for a short-lived Entra token
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24.x"
          cache: true

      # Ensure everything is compiling
      - run: "vp install --frozen-lockfile"
      - run: "vp run build"

      # Lets us use one-liner JSON manipulations in the package.json files
      - run: "vp install -g json"

      # Setup the environment
      - run: json -I -f packages/django-vscode/package.json -e "this.version=process.env.GITHUB_REF_NAME.replace(/^django-vscode-/, '')"

      # To deploy we need isolated node_modules folders which pnpm won't do because it is a workspace
      # So, remove the workspace
      - run: "rm package.json pnpm-workspace.yaml pnpm-lock.yaml"
      - run: "rm -rf packages/django-vscode/node_modules" # pnpm version of stuff, needs to be removed
      # ... and remove the workspace:* references
      - run: json -I -f packages/django-vscode/package.json -e 'this.dependencies["django-template-language-server"]="*"'
      # The extension is already built, so remove workspace-only development metadata before npm reads the package.
      - run: json -I -f packages/django-vscode/package.json -e 'delete this.devDependencies; delete this.scripts["vscode:prepublish"]'

      # Exchange GitHub's OIDC token for a short-lived Microsoft Entra token.
      - name: Log in to Azure with workload identity federation
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - run: |
          cd packages/django-vscode
          npm install --omit=dev

          # Just a hard constraint from the vscode marketplace's usage of Azure tokens
          # Ship it
          npx --yes @vscode/vsce@3.9.2 publish --azure-credential
          npx ovsx publish -p $OVSX_TOKEN

        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
