name: Tagged Production Deploys for VS Code

on:
  push:
    tags:
      - "django-vscode-*"

permissions: {}

jobs:
  deploy:
    # prevents this action from running on forks
    if: github.repository == 'EpicAlbin03/django-templates-extension'
    # The environment name is part of the Entra federated credential subject.
    environment: vscode-marketplace
    permissions:
      contents: read # to fetch code for packaging
      id-token: write # to exchange GitHub's OIDC token for a short-lived Entra token
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24.x"
          cache: true

      # Ensure everything is compiling against the frozen dependency graph.
      - run: vp install --frozen-lockfile

      # Setup the environment without one-line JSON mutations or a global JSON utility.
      # To deploy we need an isolated node_modules tree rather than pnpm workspace links;
      # the staging script copies the frozen production closure instead of removing the workspace.
      # Build and pack the language server from this exact checkout, stage it into the
      # extension, verify its metadata/checksum, smoke-start it, and create one VSIX.
      - name: Create verified VSIX
        env:
          EXTENSION_VERSION: ${{ github.ref_name }}
          REVISION: ${{ github.sha }}
          VSIX_PATH: ${{ runner.temp }}/django-templates.vsix
          STAGING_PATH: ${{ runner.temp }}/django-templates-staging
        run: |
          EXTENSION_VERSION="${EXTENSION_VERSION#django-vscode-}"
          node tools/package-extension.mjs \
            --version "$EXTENSION_VERSION" \
            --revision "$REVISION" \
            --out "$VSIX_PATH" \
            --work-dir "$STAGING_PATH"

      - name: Upload immutable VSIX
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: django-templates-vsix
          path: ${{ runner.temp }}/django-templates.vsix
          if-no-files-found: error

      # Exchange GitHub's OIDC token for a short-lived Microsoft Entra token.
      - name: Log in to Azure with workload identity federation
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # Both marketplaces receive the exact same prebuilt bytes.
      # This is a hard constraint from the VS Code marketplace's usage of Azure tokens.
      # Ship it.
      - name: Publish VSIX
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
          VSIX_PATH: ${{ runner.temp }}/django-templates.vsix
        run: |
          vp exec vsce publish --packagePath "$VSIX_PATH" --azure-credential
          vp exec ovsx publish "$VSIX_PATH" -p "$OVSX_TOKEN"
