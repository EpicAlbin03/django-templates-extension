name: CI
on: pull_request
permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  test:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24.x"
          cache: true

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp run build

      # Run any tests
      - run: vp test
        env:
          CI: true

  test-supported-node:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22.18.x"
          cache: true

      # Exercise the minimum Node.js version supported by this repository
      - run: node --version

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp run build

      # Run any tests
      - run: vp test
        env:
          CI: true

  lint:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24.x"
          cache: true

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp check
