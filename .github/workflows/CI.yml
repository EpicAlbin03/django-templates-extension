name: CI
on: pull_request
permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  test:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24.x"
          cache: true

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp run build

      # Run any tests
      - run: vp test
        env:
          CI: true

  test-supported-node:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "22.18.x"
          cache: true

      # Exercise the minimum Node.js version supported by this repository
      - run: node --version

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp run build

      # Run any tests
      - run: vp test
        env:
          CI: true

  lint:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24.x"
          cache: true

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp check
