name: CI
on: pull_request
permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  test:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24.x"
          cache: true

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp run build

      # Run any tests
      - run: vp test
        env:
          CI: true

      - name: Check VSIX package budgets
        shell: bash
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/django-vscode"
          vsix="$RUNNER_TEMP/django-templates.vsix"
          mkdir -p "$stage"
          tar -C packages/django-vscode --exclude=node_modules -cf - . | tar -C "$stage" -xf -
          node - "$stage/package.json" <<'NODE'
          const fs = require("node:fs");
          const path = process.argv[2];
          const manifest = JSON.parse(fs.readFileSync(path, "utf8"));
          delete manifest.devDependencies;
          delete manifest.scripts["vscode:prepublish"];
          fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          npm install --prefix "$stage" --omit=dev --ignore-scripts --no-package-lock
          (cd "$stage" && npx --yes @vscode/vsce@3.9.2 package --out "$vsix")

          listing="$RUNNER_TEMP/vsix-files.txt"
          unzip -Z1 "$vsix" > "$listing"
          bytes=$(stat --format=%s "$vsix")
          files=$(grep -vc '/$' "$listing")
          max_bytes=2600000
          max_files=90
          echo "VSIX: $bytes bytes, $files files"
          test "$bytes" -le "$max_bytes"
          test "$files" -le "$max_files"
          grep -qx 'extension/dist/extension.cjs' "$listing"
          grep -qx 'extension/dist/server/bin/server.js' "$listing"
          grep -qx 'extension/dist/server/dist/index.mjs' "$listing"

  test-supported-node:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "22.18.x"
          cache: true

      # Exercise the minimum Node.js version supported by this repository
      - run: node --version

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp run build

      # Run any tests
      - run: vp test
        env:
          CI: true

  lint:
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24.x"
          cache: true

      # Get projects set up
      - run: vp install --frozen-lockfile
      - run: vp check
