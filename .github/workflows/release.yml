name: Release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release:
    # prevents this action from running on forks
    if: github.repository == 'EpicAlbin03/django-templates-extension'
    permissions:
      contents: write # to create release (changesets/action)
      id-token: write # OpenID Connect token needed for provenance
      pull-requests: write # to create pull request (changesets/action)
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24.x"
          cache: true

      - name: Install
        run: vp install --frozen-lockfile
      - name: Build
        run: vp run build

      # Changesets selects pnpm from the workspace. pnpm 10 delegates publishing to
      # npm, whose trusted-publishing implementation is known to work with this setup.
      - name: Install OIDC-compatible publish client
        run: |
          npm install --prefix "$RUNNER_TEMP/pnpm10" pnpm@10.30.2
          echo "$RUNNER_TEMP/pnpm10/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: vp run changeset:version
          publish: vp run changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          npm_config_manage_package_manager_versions: "false"
